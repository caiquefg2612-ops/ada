{% extends "base.html" %}

{% block title %}Admin - Criar Usuário{% endblock %}

{% block content %}
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #0066B3 0%, #009E2C 100%);
        min-height: 100vh;
    }

    .container {
        max-width: 500px;
        margin: 0 auto;
        padding: 40px 20px;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .card {
        background: white;
        border-radius: 20px;
        padding: 35px;
        box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        width: 100%;
    }

    .card h1 {
        color: #0066B3;
        font-size: 1.8rem;
        margin-bottom: 10px;
        border-left: 4px solid #009E2C;
        padding-left: 15px;
    }

    .form-group {
        margin-bottom: 20px;
    }

    .form-group label {
        display: block;
        font-weight: bold;
        color: #333;
        margin-bottom: 8px;
    }

    .form-group input,
    .form-group select {
        width: 100%;
        padding: 12px 15px;
        border: 2px solid #e0e0e0;
        border-radius: 10px;
        font-size: 1rem;
        transition: border-color 0.3s;
    }

    .form-group input:focus,
    .form-group select:focus {
        outline: none;
        border-color: #0066B3;
    }

    .btn-criar {
        background: #009E2C;
        color: white;
        border: none;
        padding: 14px;
        border-radius: 10px;
        font-size: 1rem;
        font-weight: bold;
        cursor: pointer;
        width: 100%;
        transition: background 0.3s;
        margin-top: 10px;
    }

    .btn-criar:hover {
        background: #007a22;
    }

    .erro {
        background: #fee;
        color: #c00;
        padding: 12px;
        border-radius: 10px;
        margin-bottom: 20px;
        border-left: 4px solid #c00;
    }

    .sucesso {
        background: #d4edda;
        color: #155724;
        padding: 12px;
        border-radius: 10px;
        margin-bottom: 20px;
        border-left: 4px solid #28a745;
    }

    .voltar {
        text-align: center;
        margin-top: 20px;
    }

    .voltar a {
        color: #0066B3;
        text-decoration: none;
    }

    .voltar a:hover {
        text-decoration: underline;
    }

    body.alto-contraste .card {
        background: black;
        border: 2px solid yellow;
    }

    body.alto-contraste .form-group input,
    body.alto-contraste .form-group select {
        background: black;
        color: yellow;
        border-color: yellow;
    }
</style>

<div class="container">
    <div class="card">
        <h1>Criar Novo Usuário</h1>

        {% if erro %}
        <div class="erro">{{ erro }}</div>
        {% endif %}
        {% if sucesso %}
        <div class="sucesso">{{ sucesso }}</div>
        {% endif %}

        <form method="POST">
            <div class="form-group">
                <label>Nome completo *</label>
                <input type="text" name="nome" required placeholder="Nome completo">
            </div>

            <div class="form-group">
                <label>E-mail *</label>
                <input type="email" name="email" required placeholder="usuario@email.com">
            </div>

            <div class="form-group">
                <label>Senha *</label>
                <input type="password" name="senha" required placeholder="••••••">
            </div>

            <div class="form-group">
                <label>Tipo de deficiência (opcional)</label>
                <select name="deficiencia">
                    <option value="">Selecione...</option>
                    <option value="Deficiência Visual">Deficiência Visual</option>
                    <option value="Deficiência Auditiva">Deficiência Auditiva</option>
                    <option value="Deficiência Física">Deficiência Física</option>
                    <option value="Deficiência Intelectual">Deficiência Intelectual</option>
                    <option value="Neurodivergente (TEA)">Neurodivergente (TEA)</option>
                    <option value="Múltipla">Múltipla</option>
                </select>
            </div>

            <button type="submit" class="btn-criar">Criar Usuário</button>
        </form>

        <div class="voltar">
            <a href="{{ url_for('admin_usuarios') }}">← Voltar para lista de usuários</a>
        </div>
    </div>
</div>
{% endblock %}
